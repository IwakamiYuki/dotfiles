# prefix
set-option -g prefix C-t
bind-key C-t send-prefix
unbind-key C-b

# デフォルトシェルを zsh に設定（macOS Sonoma 以降の対応）
set-option -g default-shell /bin/zsh
# デフォルトコマンドで zsh をインタラクティブシェルとして起動
set-option -g default-command "exec /bin/zsh -i"

# ウィンドウ番号1から開始する
set-option -g base-index 1

# ウィンドウ履歴の最大行数
set-option -g history-limit 10000

# ステータスバーをトップに配置する
set-option -g status-position top

# 左右のステータスバーの長さを決定する
set-option -g status-left-length 90
set-option -g status-right-length 120

# #H => マシン名
# #P => ペイン番号
# 最左に表示
set-option -g status-left '#H:[#P]'

# Wi-Fi、バッテリー残量、現在時刻
# 最右に表示
set-option -g status-right '#(wifi) #(battery --tmux) %Y-%m-%d(%a) %H:%M:%S'


# ステータスバーを Utf-8 に対応
#set-option -g status-utf8 on

# ステータスバーを1秒毎に描画し直す
set-option -g status-interval 1

# status line の背景色を指定する。
#set-option -g status-bg "colour47"
set-option -g status-bg "colour208"

# status line の文字色を指定する。
#set-option -g status-fg "colour255"
set-option -g status-fg "colour232"

# センタライズ（主にウィンドウ番号など）
set-option -g status-justify centre

# ペインの境界線の色を設定
# 非アクティブペイン：明るいグレー
set-option -g pane-border-style fg=colour250
# アクティブペイン：鮮やかなオレンジ（色番号を208に戻して明るさを上げる）
set-option -g pane-active-border-style fg=colour208,bold
# アクティブペインの境界線を太くする（太線を使用）
set-option -g pane-border-lines heavy
# アクティブペインは透明、非アクティブペインはグレーっぽく
set-option -g window-active-style bg=terminal
set-option -g window-style bg=colour233

# ペインボーダーにステータス情報を表示
set-option -g pane-border-status bottom
set-option -g pane-border-format "#(~/.tmux/scripts/tmux-pane-border '#{pane_current_path}')"

# ペイン番号表示時間を長くする (Ctrl-t qで表示される番号の表示時間)
set-option -g display-panes-time 3000


# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# 背景を透過にする (一時的な変更、Ctrl-t r で元に戻る)
bind t set-option -g window-style "bg=default" \; set-option -g window-active-style "bg=default" \; display "Transparent!"

# マウス操作を有効にする
# これを有効にすると、MacでCommand+Cなどができなくなるが、Optionを押しながら範囲選択すると、コピーできる。
# http://qiita.com/jyotti/items/70a3a8035d767f99f93d
set-option -g mouse on

# Prefix keyあｇ押されているときにステータスバーに色をつける
set-option -g status-left '#[fg=colour232,bg=colour214]#{?client_prefix,#[reverse],} #H[#S] #[default]'


# | でペインを立てに分割する
unbind %
bind | split-window -h -c "#{pane_current_path}"
if-shell '[[ "`tmux -V`" =~ 1\.8 ]]' 'bind | split-window -h'

# - でペインを横に分割する
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
if-shell '[[ "`tmux -V`" =~ 1\.8 ]]' 'bind - split-window -v'

# 新しいウィンドウを起動したときに zi を実行してからクリアする
bind c new-window -c "~" \; send-keys "zi; clear" Enter

## ペイストの設定
#set-option -g default-command "reattach-to-user-namespace -l bash"

# Vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# コピーモードでviのキーバインドを使う
setw -g mode-keys vi

# クリップボードの共有も
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
#set-option -g default-command "reattach-to-user-namespace -l zsh"""

# openコマンドを使えるようにする
#set -g default-command "reattach-to-user-namespace -l ${SHELL}\""
#set-option -g default-command ""

# synchronizeの設定
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# gでlazygitをポップアップウィンドウで開く
bind-key g display-popup -E -d "#{pane_current_path}" -h "95%" -w "95%" "PATH=/opt/homebrew/bin:$PATH /opt/homebrew/bin/lazygit"

# tmux-ai keybinding
bind-key a run-shell "~//work/other/tmux-ai/bin/tmux-ai"

# Git commit helper with Claude (COMMENTED OUT - using Codex instead)
# C-t m: Let Claude analyze git changes and suggest commit message
# bind-key m display-popup -E -d "#{pane_current_path}" -h "80%" -w "80%" "zsh -c 'source ~/.zshrc 2>/dev/null; echo \"🤖 Claudeがgitの変更内容を分析中...\"; RESULT=\$(PATH=/opt/homebrew/bin:$PATH claude -p \"現在のgitの変更内容を分析して、適切なコミットメッセージを日本語で1つだけ出力してください。Conventional Commitsの形式で、簡潔で分かりやすい日本語のメッセージを作成してください。\"); CLEAN_RESULT=\$(printf \"%s\" \"\$RESULT\"); echo \"📝 提案されたコミットメッセージ:\"; printf \"%s\" \"\$CLEAN_RESULT\"; echo \"\\n📋 クリップボードにコピーしました\"; printf \"%s\" \"\$CLEAN_RESULT\" | pbcopy; sleep 1'"

# Git commit helper with Codex CLI
# C-t m: Let Codex analyze git changes and suggest commit message
# Uses: codex exec with gpt-5.1-codex (fastest model for code tasks)
# Note: Analyzes only staged changes (git add) for commit message
bind-key m display-popup -E -d "#{pane_current_path}" -h "80%" -w "80%" "zsh -c 'source ~/.zshrc 2>/dev/null; echo \"🤖 Codex (gpt-5.1-codex) がステージされた変更を分析中...\"; GIT_DIFF=\$(git diff --staged 2>/dev/null); if [ -z \"\$GIT_DIFF\" ]; then echo \"❌ エラー: ステージされた変更がありません (git add を実行してください)\"; sleep 2; exit 1; fi; RESULT=\$(PATH=/opt/homebrew/bin:\$PATH codex exec -m gpt-5.1-codex \"git add でステージされた変更内容のみを分析して、適切なコミットメッセージを日本語で1つだけ出力してください。Conventional Commitsの形式（feat:, fix:, refactor: など）で出力してください。ただし、スコープ（括弧で囲まれた部分）は含めず、type: description の形式のみで出力してください。例: feat: 新機能を追加、fix: バグを修正。コミットメッセージのみを出力し、説明や追加情報は不要です。ステージされていない変更は無視してください。\" 2>/dev/null); if [ -z \"\$RESULT\" ]; then echo \"❌ エラー: Codexからの応答が空です\"; sleep 2; exit 1; fi; CLEAN_RESULT=\$(printf \"%s\" \"\$RESULT\" | sed \"s/^[[:space:]]*//;s/[[:space:]]*\$//\" | head -1); echo \"📝 提案されたコミットメッセージ:\"; printf \"%s\" \"\$CLEAN_RESULT\"; echo \"\\n📋 クリップボードにコピーしました\"; printf \"%s\" \"\$CLEAN_RESULT\" | pbcopy; sleep 2'"

# Claude Code /todos command shortcut
# C-t T: Execute /todos command in Claude Code
bind-key T send-keys "/todos" Enter

# Shift+Enter for multi-line input in Claude Code, Codex, Copilot CLIs
# When using these tools within tmux, Shift+Enter submits multi-line input
# This remaps Shift+Enter to send the escape sequence that these AI CLI tools expect
bind -n S-Enter send-keys Escape "\[13;2u"

# VS Code を開く
# C-t v: Open VS Code in the current pane's directory
bind-key v display-popup -E -d "#{pane_current_path}" -h "10" -w "50" "PATH=/usr/local/bin:$PATH code ."

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# tmux-continuum: 15分ごとに自動保存、起動時に自動復元
# （デフォルトシェル問題の解決後に 'on' に戻す）
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# TPM の初期化（このファイルの最終行に必ず記述）
run '~/.tmux/plugins/tpm/tpm'

